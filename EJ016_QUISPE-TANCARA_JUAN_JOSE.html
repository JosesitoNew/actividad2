<!--16. Construir plantillas diseñada para ingresar los datos de 
una mascota:  
Nombre mascota, edad, raza, color, peso -->


<!--input =entrada (nos sirve para ingresar datos  )
form = formulario (permite al usuario ingresar y enviar elementos )
label = etiqueta(una piece atada a un objeto dando información como
un identificador ,nos sera util por qué va relacionar el label y el input)
type = tipo (define tipo de dato),
name = nombre (nombre con el que se envia el dato )
step = precisión (nos sirve para poner cualquier numero  adentro) 
submit = enviar(si tenemos un formulario  este nos servira para que se envie los datos ) -->


<!DOCTYPE html>
<html lang="es">
<head>
  <title>Registro de Mascota</title>
</head>
<body>

  <h1>Registro de Mascota</h1>

  <form>
    <label>Nombre de la mascota:</label><br>
    <input type="text" name="nombre"><br><br>


    <label>Edad:</label><br>
    <input type="number" name="edad"><br><br>

    <label>Raza:</label><br>
    <input type="text" name="raza"><br><br>

    <label>Color:</label><br>
    <input type="text" name="color"><br><br>

    <label>Peso (kg):</label><br>
    <input type="number" step="0.1" name="peso"><br><br>
       <br>
        <br>
        <button type="submit">Enviar</button>
  </form>

</body>
</html>
